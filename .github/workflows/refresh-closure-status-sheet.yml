name: Refresh Closure Status Sheet Weekly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: read
  id-token: write

concurrency:
  group: refresh-closure-status-sheet
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::googlesheets4
            any::jsonlite
            any::readr
            any::readxl

      - name: Download current weekly closed school file
        shell: bash
        run: >
          python ./scripts/download_weekly_closed_school_search_file.py
          --output ./data_pipelines/federal_closure/raw/weekly_closed_school_search/latest.zip
          --metadata ./data_pipelines/federal_closure/raw/weekly_closed_school_search/latest.json

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/32440174914/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: github-actions-sheets@project-d5e32b84-d94f-446f-9b5.iam.gserviceaccount.com
          create_credentials_file: true

      - name: Publish closure status sheet
        shell: bash
        run: >
          Rscript --vanilla ./scripts/publish_closure_status_sheet.R
          --weekly-zip ./data_pipelines/federal_closure/raw/weekly_closed_school_search/latest.zip
          --weekly-metadata ./data_pipelines/federal_closure/raw/weekly_closed_school_search/latest.json
          --sheet "https://docs.google.com/spreadsheets/d/1TyVZlzfoD1sr0jID6Rt421-bN5wS_9JjWnCBofmbhi8/edit?usp=sharing"
          --auth-json "${{ steps.auth.outputs.credentials_file_path }}"
