name: Refresh IPEDS Full Dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 7 1 *"
    - cron: "0 12 24 9 *"
    - cron: "0 12 10 12 *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IPEDS_START_YEAR: "2014"
  IPEDS_END_YEAR: "2024"
  CLOSURE_SHEET_URL: "https://docs.google.com/spreadsheets/d/1TyVZlzfoD1sr0jID6Rt421-bN5wS_9JjWnCBofmbhi8/edit?gid=0#gid=0"

permissions:
  contents: write

concurrency:
  group: refresh-ipeds-full
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages
        shell: bash
        timeout-minutes: 5
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Restore IPEDS download cache
        uses: actions/cache@v4
        with:
          path: ipeds/cache/downloads
          key: ipeds-downloads-${{ runner.os }}-${{ hashFiles('scripts/collect_ipeds_data.R', 'scripts/build_ipeds_dataset.R') }}
          restore-keys: |
            ipeds-downloads-${{ runner.os }}-

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Set up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr
            any::httr
            any::httr2
            any::jsonlite
            any::openxlsx
            any::purrr
            any::readr
            any::readxl
            any::stringr
            any::tidyr
            any::xml2

      - name: Run shared helper smoke tests
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript --vanilla ./tests/run_shared_helper_smoke_tests.R

      - name: Rebuild canonical IPEDS dataset
        shell: bash
        timeout-minutes: 180
        run: >
          Rscript --vanilla ./scripts/build_ipeds_dataset.R --start-year "${IPEDS_START_YEAR}" --end-year "${IPEDS_END_YEAR}"

      - name: Rebuild Scorecard and graduation-rate joins
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript --vanilla ./scripts/build_outcomes_join.R --download-missing TRUE

      - name: Refresh accreditation actions with cache fallback
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript --vanilla ./scripts/build_accreditation_actions.R

      - name: Refresh college cuts with cache fallback
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript --vanilla ./scripts/build_college_cuts_join.R

      - name: Build unfiltered research join for USAspending analysis
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript --vanilla ./scripts/build_grant_witness_join.R --skip-usaspending-filter

      - name: Refresh USAspending reinstatement analysis
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript --vanilla ./scripts/build_grant_witness_usaspending_sensitivity.R

      - name: Refresh research cuts with Proposal G filter
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript --vanilla ./scripts/build_grant_witness_join.R

      - name: Import closure outputs from published Google Sheet
        shell: bash
        timeout-minutes: 10
        continue-on-error: true
        run: >
          python ./scripts/import_closure_sheet.py
          --sheet "${CLOSURE_SHEET_URL}"

      - name: Rebuild HCM lookup
        shell: bash
        timeout-minutes: 10
        run: >
          python ./scripts/build_hcm_level2.py

      - name: Rebuild federal composite score lookup
        shell: bash
        timeout-minutes: 10
        run: >
          python ./scripts/build_federal_composite_scores.py

      - name: Rebuild static web exports
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript --vanilla ./scripts/build_web_exports.R

      - name: Validate rebuilt artifacts
        shell: bash
        timeout-minutes: 5
        run: |
          node ./tests/test_data_exports.js
          python ./tests/test_import_supabase.py

      - name: Commit and push updated data
        shell: bash
        timeout-minutes: 5
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          date=$(date +%F)
          git commit -m "Automated IPEDS refresh ($date)"
          git push
