name: Refresh Source Data Weekly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLOSURE_SHEET_URL: "https://docs.google.com/spreadsheets/d/1TyVZlzfoD1sr0jID6Rt421-bN5wS_9JjWnCBofmbhi8/edit?gid=0#gid=0"
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

permissions:
  contents: write

concurrency:
  group: refresh-source-data-weekly
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ~/renv/library
          key: r-${{ runner.os }}-${{ hashFiles('renv.lock') }}

      - name: Restore R packages
        run: Rscript -e "renv::restore()"

      - name: Run shared helper smoke tests
        shell: bash
        run: >
          Rscript --vanilla ./tests/run_shared_helper_smoke_tests.R

      - name: Refresh accreditation actions with cache fallback
        shell: bash
        run: >
          Rscript --vanilla ./scripts/build_accreditation_actions.R

      - name: Sync Supabase institution → unitid mapping
        shell: bash
        run: >
          python ./scripts/import_supabase_institution_mapping.py

      - name: Refresh college cuts from public API
        shell: bash
        run: >
          Rscript --vanilla ./scripts/build_college_cuts_join.R

      - name: Build unfiltered research join for USAspending analysis
        shell: bash
        run: >
          Rscript --vanilla ./scripts/build_grant_witness_join.R --skip-usaspending-filter

      - name: Refresh USAspending reinstatement analysis
        shell: bash
        run: >
          Rscript --vanilla ./scripts/build_grant_witness_usaspending_sensitivity.R

      - name: Refresh research cuts with Proposal G filter
        shell: bash
        run: >
          Rscript --vanilla ./scripts/build_grant_witness_join.R

      - name: Import closure outputs from published Google Sheet
        shell: bash
        run: >
          python ./scripts/import_closure_sheet.py
          --sheet "${CLOSURE_SHEET_URL}"

      - name: Rebuild static web exports
        shell: bash
        run: >
          Rscript --vanilla ./scripts/build_web_exports.R

      - name: Commit and push updated data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/ data_pipelines/college_cuts/supabase_institution_unitid_mapping.csv || true
          git diff --cached --quiet || git commit -m "chore: refresh site data [skip ci]"
          git push
