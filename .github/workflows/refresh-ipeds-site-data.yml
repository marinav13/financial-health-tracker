name: Refresh Source Data Weekly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CLOSURE_SHEET_URL: "https://docs.google.com/spreadsheets/d/1TyVZlzfoD1sr0jID6Rt421-bN5wS_9JjWnCBofmbhi8/edit?gid=0#gid=0"

permissions:
  contents: write

concurrency:
  group: refresh-source-data-weekly
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: |
            r-${{ runner.os }}-

      - name: Restore R packages
        run: Rscript -e "renv::restore()"

      - name: Compute weekly cache key
        id: cache-week
        shell: bash
        run: echo "week=$(date +%Y-W%V)" >> $GITHUB_OUTPUT

      - name: Cache accreditation scraped HTML
        uses: actions/cache@v4
        with:
          path: data_pipelines/accreditation/cache
          key: accreditation-cache-v1-${{ steps.cache-week.outputs.week }}
          restore-keys: |
            accreditation-cache-v1-

      - name: Cache Grant Witness downloads and USAspending responses
        uses: actions/cache@v4
        with:
          path: data_pipelines/grant_witness/cache
          key: grant-witness-cache-v1-${{ steps.cache-week.outputs.week }}
          restore-keys: |
            grant-witness-cache-v1-

      - name: Run shared helper smoke tests
        shell: bash
        run: >
          Rscript ./tests/run_shared_helper_smoke_tests.R

      - name: Refresh accreditation actions with cache fallback
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript ./scripts/build_accreditation_actions.R
          --financial-input data/downloads/full_dataset.csv

      - name: Sync Supabase institution → unitid mapping
        shell: bash
        timeout-minutes: 10
        run: >
          python ./scripts/import_supabase_institution_mapping.py --skip-stale-check

      - name: Verify Supabase mapping exists
        shell: bash
        run: |
          test -s data_pipelines/college_cuts/supabase_institution_unitid_mapping.csv || { echo "Missing Supabase mapping CSV"; exit 1; }

      - name: Refresh college cuts from public API
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript ./scripts/build_college_cuts_join.R
          --financial-input data/downloads/full_dataset.csv

      - name: Build unfiltered research join for USAspending analysis
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript ./scripts/build_grant_witness_join.R
          --financial-input data/downloads/full_dataset.csv
          --skip-usaspending-filter

      - name: Refresh USAspending reinstatement analysis
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript ./scripts/build_grant_witness_usaspending_sensitivity.R

      - name: Refresh research cuts with Proposal G filter
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript ./scripts/build_grant_witness_join.R
          --financial-input data/downloads/full_dataset.csv

      - name: Import closure outputs from published Google Sheet
        shell: bash
        timeout-minutes: 10
        continue-on-error: true
        run: >
          python ./scripts/import_closure_sheet.py
          --sheet "${CLOSURE_SHEET_URL}"

      - name: Rebuild static web exports
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript ./scripts/build_web_exports.R
          --input data/downloads/full_dataset.csv

      - name: Commit and push updated data
        shell: bash
        timeout-minutes: 5
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/ data_pipelines/college_cuts/supabase_institution_unitid_mapping.csv || true
          git diff --staged --quiet || git commit -m "chore: refresh data [skip ci]"
          git push