name: Refresh Source Data Weekly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IPEDS_START_YEAR: "2014"
  IPEDS_END_YEAR: "2024"
  # Closure sheet import is temporarily disabled while the upstream
  # closure tracker is being rebuilt outside this repo. Re-enable by
  # un-commenting CLOSURE_SHEET_URL here AND the matching "Import closure
  # outputs ..." step below. tests/test_import_closure_sheet.py runs
  # against local fixtures and is unaffected.
  # CLOSURE_SHEET_URL: "https://docs.google.com/spreadsheets/d/1TyVZlzfoD1sr0jID6Rt421-bN5wS_9JjWnCBofmbhi8/edit?gid=0#gid=0"

permissions:
  contents: write

concurrency:
  group: refresh-source-data-weekly
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: renv/library
          key: r-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: |
            r-${{ runner.os }}-

      - name: Restore R packages
        run: Rscript -e "Sys.setenv(RENV_CONFIG_SNAPSHOT_PROMPT = 'false'); renv::restore()"

      - name: Set up CI-only R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::pdftools

      - name: Compute weekly cache key
        id: cache-week
        shell: bash
        run: echo "week=$(date +%Y-W%V)" >> $GITHUB_OUTPUT

      # Mirrors the cache key used by refresh-ipeds-full.yml so the two
      # workflows share a warm bulk-download cache. Without this the
      # canonical-rebuild step below cold-fetches every IPEDS table on
      # every weekly run.
      - name: Restore IPEDS download cache
        uses: actions/cache@v4
        with:
          path: ipeds/cache/downloads
          key: ipeds-downloads-${{ runner.os }}-${{ hashFiles('scripts/collect_ipeds_data.R', 'scripts/build_ipeds_dataset.R') }}
          restore-keys: |
            ipeds-downloads-${{ runner.os }}-

      - name: Cache accreditation scraped HTML
        uses: actions/cache@v4
        with:
          path: data_pipelines/accreditation/cache
          key: accreditation-cache-v1-${{ steps.cache-week.outputs.week }}
          restore-keys: |
            accreditation-cache-v1-

      - name: Cache Grant Witness downloads and USAspending responses
        uses: actions/cache@v4
        with:
          path: data_pipelines/grant_witness/cache
          key: grant-witness-cache-v1-${{ steps.cache-week.outputs.week }}
          restore-keys: |
            grant-witness-cache-v1-

      # Cache the canonical IPEDS CSV between weekly runs. IPEDS releases
      # data 3 times a year (fall, winter, spring); refresh-ipeds-full.yml
      # is scheduled to rebuild on those releases and seeds this cache.
      # The weekly Monday refresh just needs the CSV to feed downstream
      # steps (build_web_exports, import_supabase_institution_mapping),
      # not to rebuild it from scratch — that's a 60-180 min step that
      # produces identical output until NCES releases new data.
      #
      # Cache keys are scoped by IPEDS_END_YEAR + a hash of the rebuild
      # scripts so the cache automatically invalidates when either the
      # input year window or the build logic changes. Restore-keys keeps
      # us reading any prior cache for the same end year if the script
      # hash drifts mid-cycle (still better than a 2-hour cold rebuild).
      - name: Cache canonical IPEDS dataset
        id: cache-ipeds-canonical
        uses: actions/cache@v4
        with:
          path: ipeds/derived
          key: ipeds-derived-v1-${{ runner.os }}-${{ env.IPEDS_END_YEAR }}-${{ hashFiles('scripts/build_ipeds_dataset.R', 'scripts/build_ipeds_canonical_dataset.R', 'scripts/collect_ipeds_data.R', 'scripts/shared/ipeds_helpers.R', 'scripts/shared/ipeds_row_builders.R', 'scripts/shared/ipeds_collector_helpers.R') }}
          restore-keys: |
            ipeds-derived-v1-${{ runner.os }}-${{ env.IPEDS_END_YEAR }}-
            ipeds-derived-v1-${{ runner.os }}-

      - name: Run shared helper smoke tests
        shell: bash
        run: >
          Rscript ./tests/run_shared_helper_smoke_tests.R

      # The canonical IPEDS CSV is gitignored (ipeds/derived/), so it does
      # not exist on a fresh checkout. Several downstream steps in this
      # workflow depend on it: import_supabase_institution_mapping.py
      # (Pass-2 IPEDS name match) and build_web_exports.R (--input flag).
      #
      # IPEDS only releases new data 3x/year (fall, winter, spring). The
      # rebuild is identical between releases, so we cache the canonical
      # CSV across weekly runs and only run the 60-180 min rebuild when
      # the cache is cold (eviction, year bump, or rebuild-script change).
      # refresh-ipeds-full.yml runs this rebuild on the IPEDS release
      # cadence and seeds the same cache.
      - name: Rebuild canonical IPEDS dataset (skip if cached)
        shell: bash
        timeout-minutes: 180
        env:
          CANONICAL_CSV: ipeds/derived/ipeds_financial_health_canonical_${{ env.IPEDS_START_YEAR }}_${{ env.IPEDS_END_YEAR }}.csv
        run: |
          if [ -s "$CANONICAL_CSV" ]; then
            echo "Canonical IPEDS dataset cache hit at $CANONICAL_CSV — skipping rebuild."
            ls -lh "$CANONICAL_CSV"
            exit 0
          fi
          echo "Canonical IPEDS dataset not found — rebuilding."
          Rscript ./scripts/build_ipeds_dataset.R \
            --start-year "${IPEDS_START_YEAR}" \
            --end-year "${IPEDS_END_YEAR}"

      # All subsequent scraper / refresh steps `tee` their stdout+stderr
      # into a single log file that the drift-warning gate (at the end of
      # the job) scans for known `warn_*` patterns. Keeping every scraper
      # log in one place means one grep catches drift no matter which
      # pipeline emitted it. See docs/SCRAPER_DRIFT_RUNBOOK.md.
      - name: Create refresh log directory
        shell: bash
        run: |
          mkdir -p refresh-logs
          : > refresh-logs/combined.log

      - name: Refresh accreditation actions with cache fallback
        shell: bash
        timeout-minutes: 60
        run: |
          Rscript ./scripts/build_accreditation_actions.R \
            --financial-input data/downloads/full_dataset.csv \
            2>&1 | tee -a refresh-logs/combined.log

      # Rebuild the DAPIP institutional-action pipeline so build_web_exports.R
      # has fresh file_text_path values pointing at this runner's filesystem
      # (the committed dapip_action_rows_filtered.csv carries absolute paths
      # from whichever workstation last regenerated it, e.g. "C:/Users/...").
      # Without this, the WSCUC / SACSCOC fallback tier in
      # .select_action_summary_source_text can't read the cached letter
      # text on CI and the export falls back to the raw scraper heading,
      # which makes test_data_exports.js (Providence Christian, High Point)
      # red. The accreditation cache step above also restores any prior
      # week's PDF/text cache so this stays fast on warm runs.
      - name: Rebuild DAPIP institution crosswalk
        shell: bash
        timeout-minutes: 30
        run: |
          Rscript ./scripts/build_dapip_crosswalk.R \
            --input ipeds/derived/ipeds_financial_health_canonical_2014_2024.csv \
            2>&1 | tee -a refresh-logs/combined.log

      - name: Rebuild DAPIP institutional action rows
        shell: bash
        timeout-minutes: 90
        run: |
          Rscript ./scripts/build_dapip_accreditation_actions.R \
            2>&1 | tee -a refresh-logs/combined.log

      - name: Sync Supabase institution → unitid mapping
        shell: bash
        timeout-minutes: 10
        run: |
          python ./scripts/import_supabase_institution_mapping.py --skip-stale-check \
            2>&1 | tee -a refresh-logs/combined.log

      # build_web_exports.R joins the public-table audit back to the freshly
      # rebuilt DAPIP rows, so the audit must be regenerated in the same run.
      - name: Rebuild DAPIP vs scraper audit
        shell: bash
        timeout-minutes: 30
        run: |
          Rscript ./scripts/build_dapip_vs_scraper_audit.R \
            2>&1 | tee -a refresh-logs/combined.log

      - name: Verify Supabase mapping exists
        shell: bash
        run: |
          test -s data_pipelines/college_cuts/supabase_institution_unitid_mapping.csv || { echo "Missing Supabase mapping CSV"; exit 1; }

      - name: Refresh college cuts from public API
        shell: bash
        timeout-minutes: 60
        run: |
          Rscript ./scripts/build_college_cuts_join.R \
            --financial-input data/downloads/full_dataset.csv \
            2>&1 | tee -a refresh-logs/combined.log

      - name: Refresh research cuts from Grant Witness
        shell: bash
        timeout-minutes: 60
        run: |
          Rscript ./scripts/build_grant_witness_join.R \
            --financial-input data/downloads/full_dataset.csv \
            2>&1 | tee -a refresh-logs/combined.log

      # Disabled while the upstream closure tracker is rebuilt outside
      # this repo. The committed data/closure_status_by_unitid.json is
      # left in place; closure UI is gated off in the frontend (see
      # CLAUDE.md "Do not recommend ... enabling closure display").
      # Re-enable: uncomment this step AND the CLOSURE_SHEET_URL env var
      # at the top of the workflow.
      # - name: Import closure outputs from published Google Sheet
      #   shell: bash
      #   timeout-minutes: 10
      #   run: >
      #     python ./scripts/import_closure_sheet.py
      #     --sheet "${CLOSURE_SHEET_URL}"

      - name: Rebuild static web exports
        shell: bash
        timeout-minutes: 60
        run: >
          Rscript ./scripts/build_web_exports.R
          --input ipeds/derived/ipeds_financial_health_canonical_2014_2024.csv

      - name: Validate rebuilt artifacts
        shell: bash
        timeout-minutes: 5
        run: |
          node ./tests/test_data_exports.js
          python ./tests/test_import_supabase.py

      # Preserve the rebuilt accreditation outputs when validation fails so
      # refresh regressions can be debugged from the exact JSON / pipeline
      # rows that triggered the red run.
      - name: Upload failed accreditation rebuild outputs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-accreditation-outputs
          path: |
            data/accreditation.json
            data/accreditation_index.json
            data_pipelines/accreditation/accreditation_tracker_actions_joined.csv
            data_pipelines/accreditation/dapip_action_rows_filtered.csv
            data_pipelines/accreditation/dapip_vs_scraper_audit.csv
          retention-days: 30

      # Drift-warning gate. Scrapers emit named warnings whenever a structural
      # assumption breaks (site layout change, action type disappears, parse
      # returns 0 rows from a non-empty page). We fail the refresh job if any
      # docs/SCRAPER_DRIFT_RUNBOOK.md for remediation steps per pattern.
      - name: Check for scraper drift warnings
        shell: bash
        run: |
          set -o pipefail
          LOG=refresh-logs/combined.log
          if [ ! -s "$LOG" ]; then
            echo "Refresh log $LOG is empty — scrapers produced no output, failing to be safe."
            exit 1
          fi
          # grep -E so the alternation works; -n for line numbers; || true so
          # grep's "no match" exit code doesn't abort the step before we can
          # decide. Patterns:
          #   - the three named scraper drift warnings from the warn_* helpers
          #   - the tail of warn_on_empty_parse's message (which does not
          #     include the function name)
          #   - "SCRAPER RETURNED 0 ROWS" from build_accreditation_actions.R.
          #     In normal CI mode this path stop()s and fails the step
          #     directly, but --allow-partial-accreditation demotes it to a
          #     warning(), so we catch it here as a backstop.
          MATCHES=$(grep -nE \
            'warn_if_scrape_count_dropped|warn_if_action_type_dropped|warn_on_empty_parse|Returning empty table|SCRAPER RETURNED 0 ROWS' \
            "$LOG" || true)
          if [ -n "$MATCHES" ]; then
            echo "Scraper drift warning(s) detected — refresh FAILED:"
            echo "$MATCHES"
            echo
            echo "See docs/SCRAPER_DRIFT_RUNBOOK.md for triage."
            exit 1
          fi
          echo "No scraper drift warnings found."

      - name: Upload refresh logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-logs
          path: refresh-logs/
          retention-days: 30

      - name: Commit and push updated data
        shell: bash
        timeout-minutes: 5
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/ data_pipelines/college_cuts/supabase_institution_unitid_mapping.csv || true
          git diff --staged --quiet || git commit -m "chore: refresh data [skip ci]"
          git push
