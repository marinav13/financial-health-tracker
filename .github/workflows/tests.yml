name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  r-tests:
    name: R tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"
          use-public-rspm: true

      # Cache compiled R packages. Key includes a version bump token (v1 →
      # v2 etc.) so you can force a fresh install without changing packages.
      # Once renv is set up, swap the key for:
      #   key: r-${{ runner.os }}-${{ hashFiles('renv.lock') }}
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-4.5.1-pkgs-v1
          restore-keys: |
            r-${{ runner.os }}-4.5.1-pkgs-

      # Install all packages required by the shared helpers and test fixtures.
      # Once renv.lock exists, replace this step with:
      #   run: Rscript -e "renv::restore()"
      - name: Install R packages
        run: |
          Rscript -e "install.packages(c(
            'dplyr', 'readr', 'tidyr', 'tibble', 'stringr',
            'jsonlite', 'httr2', 'xml2', 'rvest',
            'openxlsx', 'lubridate'
          ), repos = 'https://packagemanager.posit.co/cran/__linux__/jammy/latest')"

      - name: Run R tests
        run: Rscript --vanilla tests/run_shared_helper_smoke_tests.R

  js-tests:
    name: JS tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run JS tests
        run: node tests/test_frontend_structure.js

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No external packages required — test uses stdlib only.
      - name: Run Python tests
        run: python tests/test_import_closure_sheet.py
