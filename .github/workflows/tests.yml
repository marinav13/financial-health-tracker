name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  r-tests:
    name: R tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.1"
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: renv/library
          key: r-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: |
            r-${{ runner.os }}-

      - name: Restore R packages
        run: Rscript -e "Sys.setenv(RENV_CONFIG_SNAPSHOT_PROMPT = 'false'); renv::restore()"

      - name: Install lintr (CI-only, not in renv)
        run: Rscript -e "if (!requireNamespace('lintr', quietly = TRUE)) install.packages('lintr', repos = 'https://packagemanager.posit.co/cran/latest')"

      - name: Lint R sources
        run: Rscript tests/run_lintr.R

      - name: Run R tests
        run: Rscript tests/run_shared_helper_smoke_tests.R

  js-tests:
    name: JS tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run JS unit tests
        run: npm run test:smoke

  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright e2e tests
        run: npm run test:e2e

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run Python tests
        run: |
          python tests/test_import_closure_sheet.py
          python tests/test_build_federal_composite_scores.py
          python tests/test_build_hcm_level2.py
          python tests/test_import_supabase.py
