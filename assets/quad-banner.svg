<?xml version="1.0" encoding="UTF-8"?>
<!--
  Stylized college-quad banner used at the top of every institution
  profile page (cuts/accreditation/research/school in ?unitid mode).
  Single-source-of-truth: served via <img src="assets/quad-banner.svg">
  so the same illustration appears identically on all four pages.
  Paper / brick / grass palette intentionally muted to match the
  Editorial Calm body type on the page.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 240" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Stylized illustration of a college quad with a brick academic building and clock tower">
