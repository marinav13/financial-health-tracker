      <stop offset="0%" stop-color="#c9d8e6"/>
      <stop offset="70%" stop-color="#e7ddc5"/>
      <stop offset="100%" stop-color="#e5d8bb"/>
    </linearGradient>
    <linearGradient id="qb-grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8aa066"/>
      <stop offset="100%" stop-color="#6d8352"/>
    </linearGradient>
    <linearGradient id="qb-brick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a85a3b"/>
      <stop offset="100%" stop-color="#7a3e28"/>
